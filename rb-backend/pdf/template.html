<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #1a1a2e;
      background: #ffffff;
      padding: 60px 50px;
      line-height: 1.7;
    }

    .header {
      text-align: center;
      padding-bottom: 36px;
      border-bottom: 2px solid #e3b23c;
      margin-bottom: 40px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.04em;
    }

    .header .subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta {
      text-align: center;
      margin-bottom: 40px;
      font-size: 14px;
      color: #555;
    }

    .meta strong {
      color: #1a1a2e;
    }

    .section {
      margin-bottom: 32px;
      page-break-inside: avoid;
    }

    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e0cc;
    }

    .section p {
      font-size: 15px;
      color: #333;
      text-align: justify;
    }

    .footer {
      margin-top: 50px;
      padding-top: 20px;
      border-top: 1px solid #e8e0cc;
      text-align: center;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>✦ Паспорт жизни ✦</h1>
    <div class="subtitle">Персональный документ</div>
  </div>

  <div class="meta">
    <p><strong>{{OWNER}}</strong></p>
    <p>{{META_LINE}}</p>
    <p>Дата создания: {{DATE}}</p>
  </div>

  {{SECTIONS}}

  <div class="footer">
    Документ сгенерирован системой «Паспорт жизни» · passporthizni.com
  </div>

</body>
</html>
