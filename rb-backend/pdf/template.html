<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Паспорт Жизни</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #1a1714;
  --ink-mid:    #4a4540;
  --ink-soft:   #8a837a;
  --cream:      #f7f3ee;
  --cream-dark: #ede7de;
  --gold:       #b89a6a;
  --gold-light: #d4ba8e;
  --gold-pale:  #f0e8d8;
  --accent:     #6b5b8e;
  --accent-pale:#ede9f5;
  --trine-bg:   #e8f0e4;
  --trine-fg:   #2d5a1e;
  --square-bg:  #f5e8e8;
  --square-fg:  #7a1e1e;
  --conj-bg:    #e8ecf5;
  --conj-fg:    #1e2e6e;
  --sext-bg:    #e8f5f0;
  --sext-fg:    #1e5a46;
  --opp-bg:     #f5eee8;
  --opp-fg:     #6e3e1e;
  --page-w:     794px;
}

html { background: #d8d0c8; }
body {
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  color: var(--ink);
  background: #d8d0c8;
  padding: 2rem 0 4rem;
}

/* ─── PAGE SHELL ───────────────────────────────────────────── */
.page {
  width: var(--page-w);
  margin: 0 auto 2rem;
  background: var(--cream);
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 48px rgba(0,0,0,.22);
}

/* decorative corner marks */
.page::before, .page::after {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border-color: var(--gold);
  border-style: solid;
  opacity: .45;
  z-index: 1;
}
.page::before { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
.page::after  { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

/* ─── COVER PAGE ───────────────────────────────────────────── */
.cover {
  min-height: 1122px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 60px;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(184,154,106,.10) 0%, transparent 70%),
    radial-gradient(ellipse 60% 60% at 20% 100%, rgba(107,91,142,.07) 0%, transparent 60%),
    var(--cream);
}

.cover-stars {
  font-size: 22px;
  letter-spacing: 18px;
  color: var(--gold);
  margin-bottom: 28px;
  opacity: .8;
}

.cover-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 58px;
  font-weight: 300;
  color: var(--ink);
  text-align: center;
  line-height: 1.12;
  letter-spacing: .02em;
  margin-bottom: 8px;
}

.cover-subtitle {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 52px;
  text-align: center;
}

.cover-divider {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  margin: 0 auto 44px;
}

.cover-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 400;
  font-style: italic;
  color: var(--ink);
  text-align: center;
  margin-bottom: 16px;
}

.cover-meta {
  font-size: 13px;
  color: var(--ink-mid);
  text-align: center;
  line-height: 2.1;
  letter-spacing: .06em;
}

.cover-meta span { color: var(--ink-soft); }

.cover-badges {
  display: flex;
  gap: 28px;
  margin-top: 52px;
  padding-top: 36px;
  border-top: .5px solid var(--gold-light);
}

.cover-badge {
  text-align: center;
}

.badge-label {
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 5px;
}

.badge-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 400;
  color: var(--ink);
}

.cover-footer {
  position: absolute;
  bottom: 32px;
  font-size: 10px;
  letter-spacing: .15em;
  color: var(--ink-soft);
}

/* ─── INNER PAGE LAYOUT ────────────────────────────────────── */
.inner {
  min-height: 1122px;
  padding: 64px 56px 56px;
}

.page-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: .5px solid var(--gold-light);
  padding-bottom: 12px;
  margin-bottom: 36px;
}

.page-header-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: .04em;
}

.page-num {
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: .18em;
}

/* ─── SECTION LABEL ────────────────────────────────────────── */
.section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: .5px;
  background: var(--gold-light);
}

/* ─── PLANET TABLE ─────────────────────────────────────────── */
.planet-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.planet-table thead th {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding: 6px 10px;
  text-align: left;
  border-bottom: .5px solid var(--cream-dark);
}

.planet-table tbody tr {
  border-bottom: .5px solid var(--cream-dark);
  transition: background .15s;
}

.planet-table tbody tr:last-child { border-bottom: none; }
.planet-table tbody tr.highlight { background: var(--gold-pale); }

.planet-table td {
  padding: 9px 10px;
  vertical-align: middle;
}

.planet-glyph {
  font-size: 16px;
  width: 28px;
  text-align: center;
  color: var(--ink-mid);
}

.planet-name-col { font-weight: 400; color: var(--ink); }
.planet-name-col small { font-size: 11px; color: var(--ink-soft); font-weight: 300; }
.planet-sign-col { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 400; }
.planet-degree-col { font-size: 12px; color: var(--ink-mid); font-weight: 300; font-variant-numeric: tabular-nums; }
.planet-house-col {
  text-align: center;
  font-size: 11px;
  color: var(--accent);
  font-weight: 400;
}

.planet-house-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px; height: 22px;
  border: .5px solid var(--accent);
  border-radius: 50%;
  font-size: 10px;
  color: var(--accent);
}

/* ─── ASPECTS ──────────────────────────────────────────────── */
.aspects-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.aspect-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 3px;
  font-size: 13px;
}

.aspect-tag {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .12em;
  padding: 3px 10px;
  border-radius: 2px;
  min-width: 88px;
  text-align: center;
}

.tag-trine   { background: var(--trine-bg);  color: var(--trine-fg); }
.tag-square  { background: var(--square-bg); color: var(--square-fg); }
.tag-conj    { background: var(--conj-bg);   color: var(--conj-fg); }
.tag-sextile { background: var(--sext-bg);   color: var(--sext-fg); }
.tag-opp     { background: var(--opp-bg);    color: var(--opp-fg); }

.aspect-planets { font-weight: 400; flex: 0 0 160px; color: var(--ink); }
.aspect-desc { color: var(--ink-mid); font-size: 12px; flex: 1; }
.aspect-orb { font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }

/* ─── MISSION ──────────────────────────────────────────────── */
.mission-box {
  background: var(--gold-pale);
  border-left: 2px solid var(--gold);
  padding: 18px 20px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.8;
  color: var(--ink);
  border-radius: 0 4px 4px 0;
}

/* ─── STRENGTHS & CHALLENGES ───────────────────────────────── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.trait-list { list-style: none; }
.trait-list li {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  font-size: 13px;
  color: var(--ink-mid);
  padding: 6px 0;
  border-bottom: .5px solid var(--cream-dark);
  line-height: 1.5;
}
.trait-list li:last-child { border-bottom: none; }

.dot-gold  { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 5px; }
.dot-red   { width: 6px; height: 6px; border-radius: 50%; background: #b06060; flex-shrink: 0; margin-top: 5px; }

.col-header {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

/* ─── PERIODS ──────────────────────────────────────────────── */
.period-domain {
  margin-bottom: 20px;
}

.domain-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.domain-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-mid);
  display: flex;
  align-items: center;
  gap: 8px;
}

.domain-icon { font-size: 14px; }

.score-dots {
  display: flex;
  gap: 4px;
}

.sdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cream-dark);
}
.sdot.on { background: var(--gold); }

.periods-row {
  display: flex;
  gap: 6px;
}

.period-cell {
  flex: 1;
  border: .5px solid var(--cream-dark);
  border-radius: 3px;
  padding: 8px 9px;
  background: white;
  transition: all .2s;
}

.period-cell.current {
  border-color: var(--gold);
  background: var(--gold-pale);
}

.period-ages {
  font-size: 10px;
  color: var(--ink-soft);
  letter-spacing: .08em;
  margin-bottom: 3px;
}

.period-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 3px;
}

.period-cell.current .period-label { color: var(--gold); }

.period-desc {
  font-size: 11px;
  color: var(--ink-soft);
  line-height: 1.45;
}

/* ─── TIMELINE / EVENTS ────────────────────────────────────── */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  padding-left: 28px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 7px;
  top: 10px;
  bottom: 10px;
  width: .5px;
  background: linear-gradient(to bottom, var(--gold-light), var(--gold-light));
}

.tl-item {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  position: relative;
}

.tl-dot {
  position: absolute;
  left: -24px;
  top: 16px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cream);
  border: 1.5px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: var(--gold);
}

.tl-year {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--gold);
  min-width: 52px;
  line-height: 1;
  padding-top: 2px;
}

.tl-content { flex: 1; }

.tl-event {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 3px;
}

.tl-transit {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* ─── FORECAST ─────────────────────────────────────────────── */
.year-section {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: .5px solid var(--cream-dark);
}
.year-section:last-child { border-bottom: none; margin-bottom: 0; }

.year-heading {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 12px;
}

.year-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}

.year-theme {
  font-size: 15px;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  color: var(--ink);
  font-weight: 400;
}

.forecast-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}

.forecast-card {
  border: .5px solid var(--cream-dark);
  border-radius: 3px;
  padding: 10px 12px;
  background: white;
}

.fc-title {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.fc-desc {
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.6;
  margin-bottom: 8px;
}

.months-row {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.month-good {
  font-size: 10px;
  background: var(--trine-bg);
  color: var(--trine-fg);
  border-radius: 2px;
  padding: 2px 6px;
}

.month-bad {
  font-size: 10px;
  background: var(--square-bg);
  color: var(--square-fg);
  border-radius: 2px;
  padding: 2px 6px;
}

.year-transits {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 10px;
}

.transit-item {
  display: flex;
  gap: 10px;
  font-size: 12px;
  align-items: flex-start;
}

.transit-name {
  font-weight: 400;
  color: var(--accent);
  min-width: 180px;
  flex-shrink: 0;
}

.transit-inf { color: var(--ink-mid); }

.advice-box {
  background: var(--accent-pale);
  border-radius: 3px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--accent);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  line-height: 1.6;
}

/* ─── RECTIFICATION ────────────────────────────────────────── */
.rect-box {
  border: .5px solid var(--cream-dark);
  border-radius: 4px;
  overflow: hidden;
}

.rect-header {
  background: var(--cream-dark);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.rect-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-mid);
}

.rect-badges {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--ink-soft);
}

.rect-badges strong { color: var(--ink); font-weight: 400; }

.rect-note {
  padding: 12px 16px;
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.65;
  border-bottom: .5px solid var(--cream-dark);
}

.rect-events { padding: 8px 16px; }

.rect-event-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 9px 0;
  border-bottom: .5px solid var(--cream-dark);
  font-size: 12px;
}
.rect-event-row:last-child { border-bottom: none; }

.re-phase { font-size: 15px; min-width: 20px; }
.re-event { font-weight: 400; color: var(--ink); flex: 1; }
.re-transit { color: var(--ink-soft); font-size: 11px; }
.re-corr { font-variant-numeric: tabular-nums; color: var(--accent); min-width: 48px; text-align: right; }

/* ─── TIMEZONE NOTE ────────────────────────────────────────── */
.tz-note {
  margin-top: 20px;
  font-size: 11px;
  color: var(--ink-soft);
  border-top: .5px solid var(--cream-dark);
  padding-top: 10px;
  letter-spacing: .04em;
}

/* ─── PRINT ────────────────────────────────────────────────── */
@media print {
  html { background: white; }
  body { padding: 0; background: white; }
  .page {
    width: 210mm;
    margin: 0;
    box-shadow: none;
    page-break-after: always;
  }
  .page::before, .page::after { display: none; }
  .no-print { display: none !important; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════
     PRINT BUTTON (hidden on print)
═════════════════════════════════════════════════ -->
<div class="no-print" style="text-align:center;margin-bottom:1rem;">
  <button onclick="window.print()"
    style="font-family:'Jost',sans-serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;
           background:#b89a6a;color:white;border:none;padding:10px 28px;border-radius:3px;cursor:pointer;">
    Печать / Сохранить PDF
  </button>
</div>

<!-- ════════════════════════════════════════════════
     PAGES — rendered by JS from DATA object below
═════════════════════════════════════════════════ -->
<div id="root"></div>

<script>
/* ╔══════════════════════════════════════════════╗
   ║              ★  DATA OBJECT  ★               ║
   ║  Замените этот объект для нового клиента     ║
   ╚══════════════════════════════════════════════╝ */
const DATA = {{DATA_JSON}};

/* ╔══════════════════════════════════════════════╗
   ║           RENDER ENGINE                      ║
   ╚══════════════════════════════════════════════╝ */

const GLYPHS = {
  sun:'☉', moon:'☽', mercury:'☿', venus:'♀', mars:'♂',
  jupiter:'♃', saturn:'♄', uranus:'♅', neptune:'♆', pluto:'♇',
  ascendant:'ASC', mc:'МС', north_node:'☊', chiron:'⚷'
};

const PLANET_NAMES = {
  sun:'Солнце', moon:'Луна', mercury:'Меркурий', venus:'Венера',
  mars:'Марс', jupiter:'Юпитер', saturn:'Сатурн', uranus:'Уран',
  neptune:'Нептун', pluto:'Плутон', ascendant:'Асцендент',
  mc:'Середина неба', north_node:'Сев. Узел', chiron:'Хирон'
};

const ASPECT_TAGS = {
  'ТРИГОН':'tag-trine','КВАДРАТУРА':'tag-square','СОЕДИНЕНИЕ':'tag-conj',
  'СЕКСТИЛЬ':'tag-sextile','ОППОЗИЦИЯ':'tag-opp'
};

const DOMAIN_NAMES = {
  career:'Карьера', love:'Любовь', finance:'Финансы',
  health:'Здоровье', spirituality:'Духовность'
};

// current age of client (to highlight period)
const birthYear = parseInt(DATA.meta.dob.split(' ')[2]);
const currentAge = 2026 - birthYear;

function page(content, num, total) {
  return `
  <div class="page">
    ${content}
    ${num > 0 ? `<div style="position:absolute;bottom:22px;right:36px;font-size:10px;letter-spacing:.12em;color:var(--ink-soft)">Страница ${num} из ${total}</div>` : ''}
  </div>`;
}

function renderCover(d) {
  const m = d.meta;
  const corrNote = m.rectification_done
    ? `<span style="font-size:11px;color:var(--gold)">скорр. ${d.rectification.final_time}</span>` : '';
  return page(`
  <div class="cover">
    <div class="cover-stars">✦ ☽ ✦</div>
    <div class="cover-title">Паспорт Жизни</div>
    <div class="cover-subtitle">Натальная карта · Периоды · Прогноз</div>
    <div class="cover-divider"></div>
    <div class="cover-name">${m.name}</div>
    <div class="cover-meta">
      ${m.dob} · ${m.tob} ${corrNote}<br>
      <span>${m.pob}</span>
    </div>
    <div class="cover-badges">
      <div class="cover-badge">
        <div class="badge-label">Асцендент</div>
        <div class="badge-value">${m.asc_sign}</div>
      </div>
      <div class="cover-badge" style="padding:0 24px;border-left:.5px solid var(--gold-light);border-right:.5px solid var(--gold-light)">
        <div class="badge-label">Солнце</div>
        <div class="badge-value">${m.sun_sign}</div>
      </div>
      <div class="cover-badge">
        <div class="badge-label">Луна</div>
        <div class="badge-value">${m.moon_sign}</div>
      </div>
    </div>
    <div class="cover-footer">${m.timezone_note}</div>
  </div>`, 0, 0);
}

function renderChartPage(d) {
  const mainPlanets = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto'];
  const pointPlanets = ['ascendant','mc','north_node','chiron'];

  function pRow(key, highlight) {
    const p = d.chart[key];
    if (!p) return '';
    const houseCell = p.house !== undefined
      ? `<td class="planet-house-col"><span class="planet-house-num">${p.house}</span></td>` : '<td></td>';
    return `
    <tr ${highlight ? 'class="highlight"' : ''}>
      <td class="planet-glyph">${GLYPHS[key]||''}</td>
      <td class="planet-name-col"><strong>${PLANET_NAMES[key]||key}</strong></td>
      <td class="planet-sign-col">${p.sign}</td>
      <td class="planet-degree-col">${p.degree}</td>
      ${houseCell}
    </tr>`;
  }

  const aspectRows = d.key_aspects.map(a => `
  <div class="aspect-row">
    <span class="aspect-tag ${ASPECT_TAGS[a.type]||'tag-conj'}">${a.type}</span>
    <span class="aspect-planets">${a.planets}</span>
    <span class="aspect-desc">${a.interpretation}</span>
    <span class="aspect-orb">орб ${a.orb}</span>
  </div>`).join('');

  return page(`
  <div class="inner">
    <div class="page-header">
      <span class="page-header-title">Натальная карта</span>
      <span class="page-num">${d.meta.name} · ${d.meta.dob}</span>
    </div>

    <div class="section-label">Положения планет</div>
    <table class="planet-table">
      <thead>
        <tr>
          <th></th><th>Планета</th><th>Знак</th><th>Градус</th><th style="text-align:center">Дом</th>
        </tr>
      </thead>
      <tbody>
        ${mainPlanets.map(k => pRow(k, false)).join('')}
        <tr><td colspan="5" style="padding:4px 0;border-bottom:.5px solid var(--cream-dark)"></td></tr>
        ${pointPlanets.map(k => pRow(k, true)).join('')}
      </tbody>
    </table>

    <div class="section-label">Ключевые аспекты</div>
    <div class="aspects-grid">${aspectRows}</div>

    <div class="section-label">Жизненное предназначение</div>
    <div class="mission-box">${d.life_mission}</div>

    <div class="section-label">Профиль личности</div>
    <div class="two-col">
      <div>
        <div class="col-header">Сильные стороны</div>
        <ul class="trait-list">
          ${d.strengths.map(s=>`<li><span class="dot-gold"></span>${s}</li>`).join('')}
        </ul>
      </div>
      <div>
        <div class="col-header">Вызовы и уроки</div>
        <ul class="trait-list">
          ${d.challenges.map(c=>`<li><span class="dot-red"></span>${c}</li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="tz-note">Часовой пояс: ${d.meta.timezone_note}</div>
  </div>`, 2, 4);
}

function renderPeriodsPage(d) {
  const domainKeys = ['career','love','finance','health','spirituality'];

  const domainsHtml = domainKeys.map(key => {
    const dom = d.life_periods[key];
    const dots = Array.from({length:10},(_,i)=>`<span class="sdot ${i<dom.score?'on':''}"></span>`).join('');
    const cells = dom.periods.map(p => {
      const [a,b] = p.ages.split('-').map(Number);
      const isCur = currentAge >= a && currentAge < b;
      return `
      <div class="period-cell ${isCur?'current':''}">
        <div class="period-ages">${p.ages}</div>
        <div class="period-label">${p.label}</div>
        <div class="period-desc">${p.description}</div>
      </div>`;
    }).join('');
    return `
    <div class="period-domain">
      <div class="domain-header">
        <div class="domain-title"><span class="domain-icon">${dom.icon||'◈'}</span>${DOMAIN_NAMES[key]}</div>
        <div class="score-dots">${dots}</div>
      </div>
      <div class="periods-row">${cells}</div>
    </div>`;
  }).join('');

  return page(`
  <div class="inner">
    <div class="page-header">
      <span class="page-header-title">Паспорт жизненных периодов</span>
      <span class="page-num">${d.meta.name} · 7-летние циклы Сатурна</span>
    </div>
    ${domainsHtml}
    <div class="tz-note" style="margin-top:12px">Периоды рассчитаны на основе вторичных прогрессий и транзитов Сатурна и Юпитера · Выделен текущий цикл</div>
  </div>`, 3, 4);
}

function renderForecastPage(d) {
  const years = d.yearly_forecast_next3.map(y => {
    const transits = y.key_transits.map(t=>`
    <div class="transit-item">
      <span class="transit-name">${t.transit}</span>
      <span class="transit-inf">${t.influence}</span>
    </div>`).join('');

    function card(title, obj) {
      const good = (obj.best_months||[]).map(m=>`<span class="month-good">${m}</span>`).join('');
      const bad  = (obj.challenging_months||[]).map(m=>`<span class="month-bad">${m}</span>`).join('');
      return `
      <div class="forecast-card">
        <div class="fc-title">${title}</div>
        <div class="fc-desc">${obj.description}</div>
        <div class="months-row">${good}${bad}</div>
      </div>`;
    }

    return `
    <div class="year-section">
      <div class="year-heading">
        <span class="year-num">${y.year}</span>
        <span class="year-theme">${y.theme}</span>
      </div>
      <div class="year-transits">${transits}</div>
      <div class="forecast-grid">
        ${card('Карьера', y.career)}
        ${card('Личная жизнь', y.personal_life)}
        ${card('Здоровье', y.health)}
      </div>
      <div class="advice-box">${y.advice}</div>
    </div>`;
  }).join('');

  // key events timeline
  const tlItems = (d.key_events||[]).map(e=>`
  <div class="tl-item">
    <div class="tl-dot">${e.phase}</div>
    <div class="tl-year">${e.year}</div>
    <div class="tl-content">
      <div class="tl-event">${e.event}</div>
      <div class="tl-transit">${e.transit}</div>
    </div>
  </div>`).join('');

  // rectification block
  const rect = d.rectification || { needed: false, original_time: '—', final_time: '—', correction_minutes: 0, confidence: '—', explanation: '—', events_analysis: [] };
  const evRows = (rect.events_analysis||[]).map(e=>`
  <div class="rect-event-row">
    <span class="re-phase">${e.phase}</span>
    <span class="re-event">${e.event}</span>
    <span class="re-transit">${e.matching_transit}</span>
    <span class="re-corr">${e.time_correction}</span>
  </div>`).join('');

  return page(`
  <div class="inner">
    <div class="page-header">
      <span class="page-header-title">Прогноз · Ректификация</span>
      <span class="page-num">${d.meta.name} · 2026–2028</span>
    </div>

    ${tlItems ? `
    <div class="section-label">Ключевые события</div>
    <div class="timeline">${tlItems}</div>` : ''}

    <div class="section-label">Прогноз на 3 года</div>
    ${years}

    <div class="section-label">Ректификация времени рождения</div>
    <div class="rect-box">
      <div class="rect-header">
        <span class="rect-title">Уточнение времени рождения</span>
        <div class="rect-badges">
          <span>Исходное: <strong>${rect.original_time}</strong></span>
          <span>Скорр.: <strong>${rect.final_time}</strong></span>
          <span>Коррекция: <strong>${rect.correction_minutes > 0 ? '+' : ''}${rect.correction_minutes} мин</strong></span>
          <span>Уверенность: <strong>${rect.confidence}</strong></span>
        </div>
      </div>
      <div class="rect-note">${rect.explanation}</div>
      <div class="rect-events">${evRows}</div>
    </div>
  </div>`, 4, 4);
}

/* ── MOUNT ── */
const urlParams = new URLSearchParams(window.location.search);
const isPreview = urlParams.get('preview') === '1';

if (isPreview) {
  // Отображаем только обложку для превью
  document.getElementById('root').innerHTML = renderCover(DATA);
  // Применяем стили превью-режима
  document.body.style.padding = '0';
  document.body.style.margin = '0';
  document.body.style.background = 'transparent';
  document.documentElement.style.background = 'transparent';
  document.body.style.overflow = 'hidden';
  document.documentElement.style.overflow = 'hidden';

  const printBar = document.querySelector('.no-print');
  if (printBar) printBar.style.display = 'none';

  // Функция авто-масштабирования страницы под размер фрейма
  const scalePage = () => {
    const pageEl = document.querySelector('.page');
    if (!pageEl) return;
    const w = window.innerWidth;
    const h = window.innerHeight;
    const scale = Math.min(w / 794, h / 1122) * 0.95;
    pageEl.style.position = 'absolute';
    pageEl.style.left = '50%';
    pageEl.style.top = '50%';
    pageEl.style.transform = `translate(-50%, -50%) scale(${scale})`;
    pageEl.style.transformOrigin = 'center center';
    pageEl.style.margin = '0';
    pageEl.style.boxShadow = '0 12px 36px rgba(0,0,0,0.3)';
    pageEl.style.borderRadius = '6px';
  };

  window.addEventListener('resize', scalePage);
  window.addEventListener('load', scalePage);
  scalePage();
  setTimeout(scalePage, 50);
  setTimeout(scalePage, 200);
} else {
  document.getElementById('root').innerHTML =
    renderCover(DATA) +
    renderChartPage(DATA) +
    renderPeriodsPage(DATA) +
    renderForecastPage(DATA);
}
</script>
</body>
</html>
