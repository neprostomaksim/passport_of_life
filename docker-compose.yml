version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passport-of-life
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BEPAID_SHOP_ID=${BEPAID_SHOP_ID}
      - BEPAID_SECRET_KEY=${BEPAID_SECRET_KEY}
      - BEPAID_AMOUNT=${BEPAID_AMOUNT:-2900}
      - PUBLIC_URL=${PUBLIC_URL}
      - PASSPORT_USE_AI=${PASSPORT_USE_AI:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Сохраняем базу данных SQLite на сервере, чтобы она не стиралась при перезапуске
      - ./rb-backend/data:/app/rb-backend/data
      # Сохраняем сгенерированные PDF-файлы на сервере
      - ./rb-backend/output:/app/rb-backend/output
